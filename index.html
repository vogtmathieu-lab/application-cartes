<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Plans - Routing Magnétique V3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Panneau de gauche */
        #control-panel { width: 380px; min-width: 380px; background: white; padding: 20px; box-sizing: border-box; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; display: flex; flex-direction: column; gap: 20px; }
        
        /* Zone d'espace de travail à droite */
        #workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 20px; box-sizing: border-box; }

        .section-title { font-size: 14px; font-weight: bold; color: #104169; border-bottom: 2px solid #104169; padding-bottom: 5px; margin: 0 0 10px 0; text-transform: uppercase; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 13px; }
        
        .btn { padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; transition: opacity 0.2s; width: 100%; text-align: center; }
        .btn:hover { opacity: 0.8; }
        
        .btn-red { background: #d32f2f; color: white; }
        .btn-orange-chantier { background: #ff9800; color: white; }
        .btn-green { background: #2e7d32; color: white; }
        .btn-blue { background: #1565c0; color: white; }
        .btn-orange { background: #e65100; color: white; }
        .btn-purple { background: #8e24aa; color: white; }
        .btn-pink { background: #e91e63; color: white; }
        .btn-dark { background: #37474f; color: white; }
        .btn-danger { background: #b71c1c; color: white; }
        
        .btn-validate { background: #009688; color: white; border: 2px solid #00796b; margin-top: 10px; }
        .btn-cancel { background: #757575; color: white; }
        .btn-export { background: #ffb300; color: #000; font-size: 14px; margin-top: 20px; }

        .tool-item { display: flex; flex-direction: column; gap: 5px; background: #f8f9fa; padding: 10px; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 10px; }
        
        .radio-group { background: #e3f2fd; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #bbdefb; font-size: 13px; margin-bottom: 10px; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* Conteneur d'export fixe (1024x768) */
        #export-container { width: 1024px; min-width: 1024px; height: 768px; min-height: 768px; background: #104169; padding: 15px; box-sizing: border-box; border-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        
        #banner { width: 100%; height: 90px; background: #104169; color: white; border: 3px solid white; box-sizing: border-box; flex-shrink: 0; }
        .banner-table { display: table; width: 100%; height: 100%; }
        .banner-cell { display: table-cell; vertical-align: middle; }
        .banner-left { width: 140px; padding-left: 15px; text-align: left; }
        .banner-center { text-align: center; }
        .banner-right { width: 140px; }
        
        #logo-cea { max-height: 70px; max-width: 120px; background: transparent; display: inline-block; }
        
        #banner-text h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        #banner-text h2 { margin: 3px 0 0 0; font-size: 16px; font-weight: 400; text-transform: uppercase; color: #ffeb3b; }
        
        #map-wrapper { position: relative; width: 100%; flex-grow: 1; margin-top: 13px; border: 3px solid white; box-sizing: border-box; }
        #map { width: 100%; height: 100%; background: #cbd5e1; cursor: default; }
        
        #legend-box { display: none; position: absolute; bottom: 20px; right: 20px; background: white; border: 2px solid #104169; padding: 12px; border-radius: 4px; z-index: 1000; width: 240px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .legend-item { display: flex; align-items: center; margin-bottom: 7px; font-size: 11px; font-weight: bold; line-height: 1.2; }
        .legend-color { width: 30px; height: 6px; margin-right: 10px; border-radius: 2px; flex-shrink: 0; }
        .legend-icon { width: 24px; height: 24px; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    </style>
</head>
<body>

    <div id="control-panel">
        
        <div>
            <h3 class="section-title">Informations du plan</h3>
            <div class="input-group">
                <label>Commune :</label>
                <input type="text" id="input-line1" value="Commune" oninput="updateBanner()">
            </div>
            <div class="input-group">
                <label>Nature du chantier :</label>
                <input type="text" id="input-line2" value="Nature du chantier" oninput="updateBanner()">
            </div>
            
            <div class="input-group" style="margin-top: 10px;">
                <label>Centrer la carte (Recherche) :</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="search-city" placeholder="Ex: Strasbourg" onkeypress="if(event.key === 'Enter') searchLocation()">
                    <button class="btn btn-dark" style="width: 60px;" onclick="searchLocation()">🔍</button>
                </div>
            </div>
        </div>

        <div>
            <h3 class="section-title">Outils de tracé</h3>
            
            <div class="tool-item">
                <input type="text" id="name-ChantierRouge" value="Zone de chantier (Fermée)">
                <button class="btn btn-red" onclick="startDraw('ChantierRouge', '#d32f2f', 7)">+ Tracer</button>
            </div>
            <div class="tool-item">
                <input type="text" id="name-ChantierOrange" value="Zone de chantier (Travaux)">
                <button class="btn btn-orange-chantier" onclick="startDraw('ChantierOrange', '#ff9800', 7)">+ Tracer</button>
            </div>

            <div class="radio-group">
                <strong>Sens des flèches (Déviations) :</strong>
                <label><input type="radio" name="arrow-dir" value="forward" checked> Sens du tracé ➔</label>
                <label><input type="radio" name="arrow-dir" value="backward"> Sens inverse 🡄</label>
                <label><input type="radio" name="arrow-dir" value="both"> Double sens ⮂</label>
            </div>

            <div class="tool-item">
                <input type="text" id="name-PP" value="Déviation principale (PP)">
                <button class="btn btn-green" onclick="startDraw('PP', '#2e7d32', 5)">+ Tracer</button>
            </div>
            <div class="tool-item">
                <input type="text" id="name-SEC" value="Déviation secondaire (SEC)">
                <button class="btn btn-blue" onclick="startDraw('SEC', '#1565c0', 5)">+ Tracer</button>
            </div>
            <div class="tool-item">
                <input type="text" id="name-VL1" value="Déviation VL 1">
                <button class="btn btn-orange" onclick="startDraw('VL1', '#e65100', 5)">+ Tracer</button>
            </div>
            <div class="tool-item">
                <input type="text" id="name-VL2" value="Déviation VL 2">
                <button class="btn btn-purple" onclick="startDraw('VL2', '#8e24aa', 5)">+ Tracer</button>
            </div>
            <div class="tool-item">
                <input type="text" id="name-PL" value="Déviation PL">
                <button class="btn btn-pink" onclick="startDraw('PL', '#e91e63', 5)">+ Tracer</button>
            </div>
        </div>
        
        <div>
            <h3 class="section-title">Validation en cours</h3>
            <button class="btn btn-validate" onclick="finishDraw()">✔️ Terminer ce tracé</button>
            <button class="btn btn-cancel" style="margin-top: 5px;" onclick="stopDraw()">❌ Annuler ce tracé</button>
        </div>

        <div>
            <h3 class="section-title">Gestion Globale</h3>
            <button class="btn btn-danger" onclick="clearAllTraces()">🗑️ Effacer tous les tracés validés</button>
            <button class="btn btn-export" onclick="exportPlan()">💾 Exporter Image (PNG)</button>
        </div>
    </div>

    <div id="workspace">
        <div id="export-container">
            <div id="banner">
                <div class="banner-table">
                    <div class="banner-cell banner-left">
                        <img id="logo-cea" src="cea-logo-rvb-vertical-fond-blanc.png" alt="Logo CeA" onerror="this.style.display='none';">
                    </div>
                    <div class="banner-cell banner-center" id="banner-text">
                        <h1 id="text-line1">Commune</h1>
                        <h2 id="text-line2">Nature du chantier</h2>
                    </div>
                    <div class="banner-cell banner-right"></div>
                </div>
            </div>

            <div id="map-wrapper">
                <div id="map"></div>
                <div id="legend-box">
                    <h3 style="margin: 0 0 10px 0; font-size: 14px; text-align: center; border-bottom: 2px solid #104169; padding-bottom: 3px;">Légende</h3>
                    <div id="legend-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const map = L.map('map', { preferCanvas: true }).setView([48.6375, 7.4481], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap', crossOrigin: true
        }).addTo(map);

            const query = document.getElementById('search-city').value;
            if (!query) return;
            try
